.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.flex1 { flex: 1; min-width: 0; }
.shrink0 { flex-shrink: 0; }
.hidden { display: none !important; }
.space-y-2 > * + * { margin-top: 8px; }
.space-y-3 > * + * { margin-top: 12px; }
.space-y-4 > * + * { margin-top: 16px; }

.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
.center { align-items: center; justify-content: center; }

h1 { font-size: 28px; }
h2 { font-size: 20px; }
h3 { font-size: 20px; }

.header-btns { display: flex; gap: 8px; }
.iconbtn { width: 36px; height: 36px; border-radius: 999px; background: #171717; border: 1px solid #262626; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }

.datenav { padding: 0 20px 12px; display: flex; align-items: center; justify-content: center; gap: 12px; }

.datenav-btn:disabled { opacity: 0.3; }
.datenav-label { font-size: 13px; font-weight: 600; color: #d4d4d4; min-width: 140px; text-align: center; }
.today-btn { padding: 4px 10px; border: 1px solid #262626; background: #171717; border-radius: 999px; font-size: 11px; font-weight: 600; color: #a3a3a3; letter-spacing: 0.05em; }
.today-btn:active { background: #262626; }

.card { border: 1px solid #262626; background: rgba(23,23,23,0.4); border-radius: 16px; overflow: hidden; }
.card-pad { padding: 16px; }

.banner { margin: 0 20px 16px; padding: 14px; border-radius: 12px; border: 1px solid rgba(245,158,11,0.3); background: rgba(245,158,11,0.05); }
.banner-reminder { margin: 0 20px 12px; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(34,211,238,0.3); background: rgba(34,211,238,0.05); display: flex; gap: 10px; align-items: center; font-size: 13px; color: #bef264; }
.banner-reminder button { margin-left: auto; color: #22d3ee; padding: 4px; }
.banner-buttons { display: flex; gap: 8px; margin-top: 12px; }
.banner-btn { padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid rgba(245,158,11,0.4); color: #fcd34d; transition: transform 0.1s; display: flex; align-items: center; gap: 6px; }
.banner-btn:active { transform: scale(0.96); }
.banner-btn.committed { background: rgba(245,158,11,0.15); color: #fde68a; }

.ring-wrap { position: relative; }
.ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.macro-bar-bg { height: 6px; background: #171717; border-radius: 999px; overflow: hidden; }
.macro-bar-fg { height: 100%; border-radius: 999px; transition: width 0.5s; }

.progress-bg { position: relative; height: 8px; background: #262626; border-radius: 999px; overflow: hidden; }
.progress-fg { position: absolute; inset: 0 auto 0 0; border-radius: 999px; transition: width 0.7s; }

.log-item { padding: 12px; display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; transition: background 0.15s; }
.log-item:active { background: rgba(38,38,38,0.5); }
.empty-state { border: 2px dashed #262626; border-radius: 16px; padding: 32px; text-align: center; }

.cat-header { display: flex; align-items: center; gap: 8px; padding: 12px 4px 6px; }
.cat-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.cat-name { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
.cat-total { font-size: 11px; color: #737373; font-family: ui-monospace, monospace; margin-left: auto; }

.water-card { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.water-info { flex: 1; }
.water-btns { display: flex; gap: 6px; }

.water-btn:active { transform: scale(0.9); }
.water-btn.plus { background: rgba(34,211,238,0.2); }

.fab { position: fixed; bottom: 24px; right: 20px; z-index: 20; width: 56px; height: 56px; border-radius: 999px; background: #d4ff3f; color: #0a0a0a; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px -10px rgba(212,255,63,0.4); transition: transform 0.1s; font-weight: 700; }
.fab:active { transform: scale(0.95); }
.anchor-btn { position: fixed; bottom: 30px; left: 20px; z-index: 20; width: 44px; height: 44px; border-radius: 999px; background: linear-gradient(135deg, rgba(251,146,60,0.2), rgba(251,146,60,0.1)); color: #fb923c; border: 1px solid rgba(251,146,60,0.35); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: transform 0.1s; }

.sheet { width: 100%; max-width: 480px; max-height: 92vh; background: #0a0a0a; border-top: 1px solid #262626; border-radius: 16px 16px 0 0; display: flex; flex-direction: column; overflow: hidden; }
@media (min-width: 640px) { .sheet { border: 1px solid #262626; border-radius: 16px; } }
.sheet-head { padding: 20px 20px 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.sheet-body { padding: 0 20px 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

.tabs { display: flex; gap: 2px; padding: 3px; background: #171717; border-radius: 12px; }
.tab { flex: 1; padding: 7px 2px; border-radius: 8px; font-size: 10px; font-weight: 600; color: #737373; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: all 0.15s; min-width: 0; }

.seg { padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: 600; color: #737373; transition: all 0.15s; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

.field { background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 12px 16px; width: 100%; font-size: 16px; color: #f5f5f5; transition: border-color 0.15s; }
.field:focus { border-color: rgba(212,255,63,0.5); }
.field-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #737373; display: block; margin-bottom: 6px; }
.field-wrap { position: relative; }
.field-suffix { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #737373; font-size: 12px; pointer-events: none; }
.field-wrap .field { padding-right: 40px; }

.btn { padding: 14px; border-radius: 12px; font-weight: 600; text-align: center; width: 100%; transition: transform 0.1s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; }
.btn-primary { background: #d4ff3f; color: #0a0a0a; }
.btn-secondary { background: #262626; color: #f5f5f5; }
.btn-danger { background: rgba(255,90,74,0.1); color: #ff8a80; border: 1px solid rgba(255,90,74,0.3); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; }

.pill { flex-shrink: 0; padding: 8px 12px; border-radius: 999px; border: 1px solid #262626; background: rgba(23,23,23,0.6); text-align: left; transition: transform 0.1s; }
.pill:active { transform: scale(0.95); border-color: rgba(212,255,63,0.5); }

.result { width: 100%; text-align: left; border: 1px solid #262626; background: rgba(23,23,23,0.5); border-radius: 12px; padding: 12px; transition: border-color 0.15s, transform 0.1s; }

.photo-btn { width: 100%; padding: 24px; border: 2px dashed #262626; border-radius: 12px; color: #a3a3a3; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.1s; }
.photo-btn:active { transform: scale(0.98); }

.photo-thumb { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid #262626; background: #171717; transition: transform 0.1s; }
.photo-thumb:active { transform: scale(0.97); }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-thumb-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 10px; font-family: ui-monospace, monospace; color: #f5f5f5; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fadein { animation: fadein 0.4s ease-out; }

.welcome { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.welcome-inner { max-width: 440px; width: 100%; }

.error { margin-top: 12px; font-size: 13px; color: #ff8a80; line-height: 1.4; }

.bg-content { padding: 40px 24px; text-align: center; }
.bg-hero { font-size: 56px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: #d4ff3f; margin: 8px 0; font-family: ui-serif, serif; }
.bg-stat { margin: 24px 0; }
.bg-stat-val { font-size: 32px; font-weight: 700; line-height: 1; }

.bg-line { height: 1px; background: #262626; margin: 20px 0; }

.wr-dot { width: 10px; height: 10px; border-radius: 999px; }

svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

function inferCategory(isoTime) {
  const d = new Date(isoTime);
  const h = d.getHours() + d.getMinutes() / 60;
  if (h >= 4 && h < 10.5) return 'breakfast';
  if (h >= 10.5 && h < 14.5) return 'lunch';
  if (h >= 14.5 && h < 20.5) return 'dinner';
  return 'snack';
}

async function cloudLoadAll(userId) {
  const out = {
    settings: null,
    weights: [],
    recents: [],
    exerciseRecents: [],
    plateauNotes: [],
    commitments: {},
    photos: [],
    savedMeals: [],
    customCondiments: [],

  // Settings (single row)
  const { data: settingsRow } = await sb.from('user_settings').select('settings').eq('user_id', userId).maybeSingle();
  if (settingsRow) out.settings = settingsRow.settings;

  // Weights
  const { data: weights } = await sb.from('weights').select('date, weight').eq('user_id', userId).order('date');
  out.weights = weights || [];

  // Everything else stored in user_data as key/value
  const { data: kv } = await sb.from('user_data').select('key, value').eq('user_id', userId);
  if (kv) {
    for (const row of kv) {
      if (row.key in out) out[row.key] = row.value;

  }
  return out;
}

function computed() {
  const t = state.log.reduce((a, f) => ({
    calories: a.calories + (f.calories || 0),
    protein: a.protein + (f.protein || 0),
    carbs: a.carbs + (f.carbs || 0),
    fat: a.fat + (f.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
  const burned = state.exercise.reduce((a, e) => a + (e.calories || 0), 0);
  const netCalories = t.calories - burned;
  const cw = state.weights.length ? state.weights[state.weights.length - 1].weight : state.settings.startWeight;
  const lost = (state.settings.startWeight - cw).toFixed(1);
  const toGoal = (cw - state.settings.goalWeight).toFixed(1);
  const inPlateau = cw >= state.settings.plateauLow && cw <= state.settings.plateauHigh;
  const remaining = state.settings.calorieTarget - netCalories;
  const progressPct = Math.min(((state.settings.startWeight - cw) / (state.settings.startWeight - state.settings.goalWeight)) * 100, 100);

  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffKey = cutoff.toISOString().slice(0, 10);
  const recentWeights = state.weights.filter(w => w.date >= cutoffKey);
  const weeklyAvg = recentWeights.length ? (recentWeights.reduce((a, w) => a + w.weight, 0) / recentWeights.length) : null;

  // Streak: consecutive past days in weeklyCache where cals were logged and <= target
  let streak = 0;
  const today = todayKey();
  const byDate = {};
  for (const d of state.weeklyCache) byDate[d.date] = d;
  const d = new Date(); d.setDate(d.getDate() - 1);
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    const rec = byDate[key];
    if (!rec || !rec.logCount) break;
    if (rec.cals > state.settings.calorieTarget) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }

  return { totals: t, burned, netCalories, currentWeight: cw, lost, toGoal, inPlateau, remaining, progressPct, weeklyAvg, streak };
}

function projectGoalDate() {
  if (state.weights.length < 3) return null;
  const recent = state.weights.slice(-21);
  if (recent.length < 3) return null;
  const first = recent[0], last = recent[recent.length - 1];
  const daysDiff = (new Date(last.date) - new Date(first.date)) / 86400000;
  if (daysDiff < 7) return null;
  const weightDiff = first.weight - last.weight;
  if (weightDiff <= 0.5) return null;
  const ratePerDay = weightDiff / daysDiff;
  const remaining = last.weight - state.settings.goalWeight;
  if (remaining <= 0) return 'reached';
  const daysToGoal = remaining / ratePerDay;
  if (daysToGoal > 730) return null;
  const projected = new Date();
  projected.setDate(projected.getDate() + Math.round(daysToGoal));
  return projected;
}

function computeWeekly() {
  // Build a 7-day array from weeklyCache, filling in zeros for any missing days
  const byDate = {};
  for (const d of state.weeklyCache) byDate[d.date] = d;
  const days = [];
  const d = new Date();
  for (let i = 0; i < 7; i++) {
    const key = d.toISOString().slice(0, 10);
    days.push(byDate[key] || { date: key, cals: 0, burned: 0, water: 0, logCount: 0 });
    d.setDate(d.getDate() - 1);
  }
  days.reverse();
  const loggedDays = days.filter(d => d.logCount > 0);
  const avgCal = loggedDays.length ? loggedDays.reduce((a, d) => a + d.cals, 0) / loggedDays.length : 0;
  const underTarget = loggedDays.filter(d => d.cals <= state.settings.calorieTarget).length;
  const totalBurned = days.reduce((a, d) => a + d.burned, 0);
  const avgWater = days.reduce((a, d) => a + d.water, 0) / 7;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const weekAgoKey = weekAgo.toISOString().slice(0, 10);
  const startW = state.weights.filter(w => w.date <= weekAgoKey).slice(-1)[0];
  const endW = state.weights[state.weights.length - 1];
  const weightChange = (startW && endW) ? (endW.weight - startW.weight).toFixed(1) : null;
  return { days, avgCal, underTarget, loggedDays: loggedDays.length, totalBurned, avgWater, weightChange };
}

// Refresh the 7-day cache from cloud. Called after login and after food/exercise writes.
async function refreshWeeklyCache() {
  if (!state.user) return;
  const today = new Date();
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 365); // only need last year for streak
  const cutoffKey = cutoff.toISOString().slice(0, 10);
  const todayK = today.toISOString().slice(0, 10);

  try {
    // Pull food log summaries across the window. For streak we need further back than 7d
    const { data: foods } = await sb.from('food_log')
      .select('date, entry')
      .eq('user_id', state.user.id)
      .gte('date', cutoffKey)
      .lte('date', todayK);
    const { data: ex } = await sb.from('exercise_log')
      .select('date, entry')
      .eq('user_id', state.user.id)
      .gte('date', cutoffKey)
      .lte('date', todayK);
    const { data: waters } = await sb.from('water')
      .select('date, amount')
      .eq('user_id', state.user.id)
      .gte('date', cutoffKey)
      .lte('date', todayK);

    const byDate = {};
    const ensure = (date) => byDate[date] = byDate[date] || { date, cals: 0, burned: 0, water: 0, logCount: 0 };
    for (const r of (foods || [])) {
      const day = ensure(r.date);
      day.cals += r.entry?.calories || 0;
      day.logCount += 1;
    }
    for (const r of (ex || [])) {
      const day = ensure(r.date);
      day.burned += r.entry?.calories || 0;
    }
    for (const r of (waters || [])) {
      const day = ensure(r.date);
      day.water = r.amount || 0;
    }
    state.weeklyCache = Object.values(byDate);
    render();
  } catch (e) {
    console.error('refreshWeeklyCache failed', e);
  }
}

function getReminder() {
  if (state.viewDate !== todayKey()) return null;
  if (state.dismissedReminderDate === todayKey()) return null;

  if (hour >= 15 && groups.lunch.length === 0 && groups.dinner.length === 0) return 'No lunch logged yet today.';
  if (hour >= 12 && state.log.length === 0) return 'No food logged yet today.';
  return null;
}

const MODEL = 'claude-haiku-4-5-20251001';
async function callClaude(body) {
  if (!state.apiKey) throw new Error('No API key — add in Settings');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json', 'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error(`API ${res.status}: ${txt.slice(0, 120)}`);
  }
  const data = await res.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('');
}
function extractJSON(text) {
  if (!text) throw new Error('Empty response');
  let s = text.trim().replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();
  try { return JSON.parse(s); } catch {}
  for (const [o, c] of [['[', ']'], ['{', '}']]) {
    const a = s.indexOf(o), b = s.lastIndexOf(c);
    if (a !== -1 && b > a) { try { return JSON.parse(s.slice(a, b + 1)); } catch {} }
  }
  throw new Error('Invalid JSON');
}

function compressImage(file, maxDim = 800, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * maxDim / width; width = maxDim; }
        else if (height > maxDim) { width = width * maxDim / height; height = maxDim; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function ringSVG(value, target, size = 168, stroke = 12) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(value / target, 1);
  const over = value > target;
  const dash = c * pct;
  return `<svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1f1f1f" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${over ? '#ff5a4a' : '#d4ff3f'}" stroke-width="${stroke}" stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition: stroke-dasharray 0.6s ease, stroke 0.3s ease"/>
  </svg>`;
}
function macroBar(label, value, target, iconName, color) {
  const pct = Math.min((value / target) * 100, 100);
  const over = value > target;
  return `<div>
    <div class="row between mb-1">
      <div class="row" style="gap:6px">${icon(iconName, 13, color, 2.5)}<span class="tiny">${label}</span></div>
      <span class="mono small" style="color:#e5e5e5">
        <span style="${over ? 'color:#ff8a80' : ''}">${Math.round(value)}</span><span class="muted">/${target}g</span>
      </span>
    </div>
    <div class="macro-bar-bg"><div class="macro-bar-fg" style="width:${pct}%;background:${over ? '#ff5a4a' : color}"></div></div>
  </div>`;
}
function sparkline() {
  const recent = state.weights.slice(-14);
  if (recent.length < 2) return '';
  const ws = recent.map(w => w.weight);
  const min = Math.min(...ws, state.settings.plateauLow) - 1;
  const max = Math.max(...ws, state.settings.plateauHigh) + 1;
  const range = max - min;
  const w = 300, h = 60;
  const pts = recent.map((pt, i) => [(i / (recent.length - 1)) * w, h - ((pt.weight - min) / range) * h]);
  const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const pTop = h - ((state.settings.plateauHigh - min) / range) * h;
  const pBot = h - ((state.settings.plateauLow - min) / range) * h;
  const dots = pts.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="${i === pts.length - 1 ? 3 : 1.5}" fill="#d4ff3f"/>`).join('');
  return `<div style="padding:0 16px 16px">
    <div class="tiny mono mb-2">Last ${recent.length} entries</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:56px">
      <rect x="0" y="${pTop}" width="${w}" height="${pBot - pTop}" fill="rgba(245,158,11,0.1)"/>
      <line x1="0" y1="${pTop}" x2="${w}" y2="${pTop}" stroke="rgba(245,158,11,0.4)" stroke-width="1" stroke-dasharray="2,3"/>
      <line x1="0" y1="${pBot}" x2="${w}" y2="${pBot}" stroke="rgba(245,158,11,0.4)" stroke-width="1" stroke-dasharray="2,3"/>
      <path d="${path}" fill="none" stroke="#d4ff3f" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>
  </div>`;
}
function groupByCategory(log) {
  const groups = { breakfast: [], lunch: [], dinner: [], snack: [] };
  for (const entry of log) {
    const cat = entry.category || inferCategory(entry.time);
    (groups[cat] || groups.snack).push(entry);
  }
  return groups;
}
function formatDateLabel(dateStr) {
  const today = todayKey();
  if (dateStr === today) return 'Today';
  const yestDate = new Date(); yestDate.setDate(yestDate.getDate() - 1);
  const yestKey = yestDate.toISOString().slice(0, 10);
  if (dateStr === yestKey) return 'Yesterday';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function fmtDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderAddMode() {
  if (state.addMode === 'search') {
    // Filter user's own foods (recents + saved meal items) on every keystroke
    const q = state.searchInput.trim().toLowerCase();
    const savedMealItems = state.savedMeals.flatMap(m => m.items || []);
    const pool = [...state.recents, ...savedMealItems];
    // Dedupe by name
    const seen = new Set();
    const unique = pool.filter(p => {
      const k = (p.name || '').toLowerCase();
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });
    const mineMatches = q ? unique.filter(p => (p.name || '').toLowerCase().includes(q)) : unique.slice(0, 8);

    return `
      <div class="field-wrap">
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);z-index:1">${icon('search', 17, '#737373')}</span>
        <input id="search-input" class="field" type="text" value="${esc(state.searchInput)}" placeholder="Search your foods or anything else..." oninput="state.searchInput = this.value; render()" onkeydown="if(event.key==='Enter') handleSearch()" style="padding-left:44px" ${state.analyzing ? 'disabled' : ''} autofocus/>
      </div>

      ${mineMatches.length > 0 ? `
        <div class="mt-3">
          <div class="row between mb-2">
            <div class="tiny mono">${q ? `Your foods (${mineMatches.length})` : 'Your foods'}</div>
            ${!q ? `<div class="tiny mono muted">Showing ${Math.min(unique.length, 8)} of ${unique.length}</div>` : ''}
          </div>
          <div class="space-y-2">
            ${mineMatches.slice(0, 10).map(f => {
              const idx = unique.indexOf(f);
              return `
                <button class="result" onclick="openPreLog('mine', ${idx})">
                  <div style="font-weight:500;font-size:14px">${esc(f.name)}</div>
                  <div class="small mono muted" style="margin-top:2px">
                    <span class="lime">${f.calories}</span> cal · P${f.protein} C${f.carbs} F${f.fat}
                  </div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}

      ${q ? `
        <button class="btn btn-secondary mt-3" onclick="handleSearch()" ${state.analyzing ? 'disabled' : ''}>
          ${state.analyzing ? `${icon('loader', 16, 'currentColor', 2, 'spin')} Searching…` : `${icon('sparkles', 14)} ${mineMatches.length > 0 ? 'Search with AI instead' : 'Search with AI'}`}
        </button>
      ` : (mineMatches.length === 0 ? `
        <div class="empty-state mt-3" style="padding:20px">
          <div class="small muted">Start typing to search your foods, or type something new and tap "Search with AI".</div>
        </div>
      ` : '')}

      ${state.searchResults.length > 0 ? `
        <div class="mt-4 space-y-2">
          <div class="tiny mono">From AI search</div>

function renderMealsTab() {

const root = document.getElementById('root');
function render() {
  const active = document.activeElement;
  const focusedId = active?.id;
  const selStart = active?.selectionStart;
  const selEnd = active?.selectionEnd;
  if (!state.authReady) {
    root.innerHTML = renderBoot();
  } else if (!state.user) {
    root.innerHTML = renderAuth();
  } else if (state.loadingCloud) {
    root.innerHTML = renderBoot('Loading your data…');
  } else {
    root.innerHTML = renderMain();
  }
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) {
      el.focus();
      if (selStart != null && typeof el.setSelectionRange === 'function') {
        try { el.setSelectionRange(selStart, selEnd); } catch {}
      }
    }
  }
}

// =====================
// ACTIONS
// =====================
function switchAuthMode() {
  state.authMode = state.authMode === 'signin' ? 'signup' : 'signin';
  state.authError = '';
  render();
}

async function handleAuth() {
  const email = state.authEmail.trim().toLowerCase();
  const password = state.authPassword;
  if (!email || password.length < 6) return;
  state.authBusy = true; state.authError = ''; render();
  try {
    if (state.authMode === 'signup') {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session) {
        state.authError = 'Account created. Please check your email to confirm (if required) and then sign in.';
        state.authMode = 'signin';
        state.authPassword = '';
      } else {
        await onSignedIn(data.user);
      }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await onSignedIn(data.user);
    }
  } catch (e) {
    state.authError = e.message || 'Auth failed.';
  } finally {
    state.authBusy = false;
    render();
  }
}

async function handleForgotPassword() {
  const email = state.authEmail.trim().toLowerCase();
  if (!email) {
    state.authError = 'Enter your email above first, then tap Forgot password.';
    render();
    return;
  }
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email);
    if (error) throw error;
    state.authError = `Password reset email sent to ${email}. Check your inbox.`;
  } catch (e) {
    state.authError = e.message || 'Could not send reset email.';
  }
  render();
}

async function onSignedIn(user) {
  state.user = user;
  state.authEmail = '';
  state.authPassword = '';
  state.authError = '';
  state.loadingCloud = true;
  render();
  try {
    const data = await cloudLoadAll(user.id);
    if (data.settings) state.settings = { ...DEFAULT_SETTINGS, ...data.settings };
    state.weights = data.weights || [];
    state.recents = data.recents || [];
    state.exerciseRecents = data.exerciseRecents || [];
    state.plateauNotes = data.plateauNotes || [];
    state.commitments = data.commitments || {};
    state.photos = data.photos || [];
    state.savedMeals = data.savedMeals || [];
    state.customCondiments = data.customCondiments || [];
    // Check if there's local data to offer migration
    state.migrationPrompt = hasLegacyLocalData() && (state.weights.length === 0);
    await loadDay(todayKey());
    refreshWeeklyCache();
    // Process any incoming URL parameters (e.g. from Apple Shortcuts)
    await handleUrlParams();
  } catch (e) {
    console.error('Data load failed', e);
    alert('Could not load your data: ' + e.message);
  } finally {
    state.loadingCloud = false;
    render();
  }
}

// Apple Shortcut bridge: reads URL params and logs automatically.
// Idempotent: the Shortcut should use replace=1 when pushing Apple Watch totals,
// so re-running it updates the single "Apple Watch activity" entry instead of stacking.
async function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const calories = parseFloat(params.get('addExercise'));
  const name = params.get('name') || 'Apple Watch activity';
  const duration = parseFloat(params.get('duration')) || 0;
  const replace = params.get('replace') === '1';
  const weight = parseFloat(params.get('logWeight'));

  let didSomething = false;

  // Weight push
  if (!isNaN(weight) && weight >= 50 && weight <= 600) {
    const today = todayKey();
    state.weights = [...state.weights.filter(x => x.date !== today), { date: today, weight }].sort((a, b) => a.date.localeCompare(b.date));
    try { await cloudSaveWeight(state.user.id, today, weight); didSomething = true; }
    catch (e) { console.error('URL weight save failed', e); }
  }

  // Exercise push
  if (!isNaN(calories) && calories > 0) {
    try {
      if (replace) {
        const matching = state.exercise.filter(e => (e.name || '').toLowerCase() === name.toLowerCase());
        for (const ex of matching) {
          try { await cloudDeleteExercise(state.user.id, ex.id); } catch {}
        }
        state.exercise = state.exercise.filter(e => (e.name || '').toLowerCase() !== name.toLowerCase());
      }
      const entry = { time: new Date().toISOString(), name, calories: Math.round(calories), duration: Math.round(duration) };
      const id = await cloudAddExercise(state.user.id, state.viewDate, entry);
      state.exercise = [...state.exercise, { ...entry, id }];
      didSomething = true;
      refreshWeeklyCache();
    } catch (e) {
      console.error('URL exercise add failed', e);
    }
  }

  if (didSomething) {
    // Clear query string so reloads don't re-trigger
    const url = new URL(window.location);
    url.search = '';
    window.history.replaceState({}, '', url.toString());
  }
}

async function signOut() {
  if (!confirm('Sign out? Your data stays in the cloud — you can sign back in anytime.')) return;
  try { await sb.auth.signOut(); } catch (e) { console.error(e); }
  state.user = null;
  state.log = []; state.exercise = []; state.water = 0;
  state.weights = []; state.recents = []; state.exerciseRecents = [];
  state.plateauNotes = []; state.commitments = {}; state.photos = [];
  state.savedMeals = []; state.customCondiments = []; state.weeklyCache = [];
  state.modal = null;
  render();
}

function hasLegacyLocalData() {
  // Is there any legacy localStorage data from before the cloud migration?
  if (localStorage.getItem('weights')) return true;
  if (localStorage.getItem('recents')) return true;
  if (localStorage.getItem('savedMeals')) return true;
  if (localStorage.getItem('settings')) return true;
  // Any log:YYYY-MM-DD key?
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith('log:') || k.startsWith('water:') || k.startsWith('exercise:'))) return true;
  }
  return false;
}

async function migrateLocalToCloud() {
  if (!state.user) return;
  if (!confirm('Import data from this device to the cloud? Your local data will be uploaded to your account. This is a one-time operation.')) return;
  state.loadingCloud = true;
  render();
  try {
    const uid = state.user.id;

    // Settings
    const localSettings = load('settings', null);
    if (localSettings) await cloudSaveSettings(uid, { ...DEFAULT_SETTINGS, ...localSettings });

    // Weights
    const localWeights = load('weights', []);
    for (const w of localWeights) {
      await cloudSaveWeight(uid, w.date, w.weight);
    }

    // Other top-level stuff
    for (const key of ['recents', 'exerciseRecents', 'plateauNotes', 'commitments', 'photos', 'savedMeals', 'customCondiments']) {
      const v = load(key, null);
      if (v) await cloudSaveData(uid, key, v);
    }

    // Per-day log/water/exercise
    const dayKeys = new Set();
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && /^(log|water|exercise):\d{4}-\d{2}-\d{2}$/.test(k)) {
        dayKeys.add(k.split(':')[1]);
      }
    }
    for (const date of dayKeys) {
      const logArr = load(`log:${date}`, []);
      for (const entry of logArr) {
        const { id, ...rest } = entry;
        await cloudAddFood(uid, date, rest);
      }
      const exArr = load(`exercise:${date}`, []);
      for (const entry of exArr) {
        const { id, ...rest } = entry;
        await cloudAddExercise(uid, date, rest);
      }
      const water = load(`water:${date}`, null);
      if (water) await cloudSaveWater(uid, date, water);
    }

    // Mark migration complete by clearing the legacy keys (except apiKey)
    const keepers = ['apiKey', 'dismissedReminderDate'];
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && !keepers.includes(k) && !k.startsWith('sb-')) toRemove.push(k);
    }
    for (const k of toRemove) localStorage.removeItem(k);

    // Reload fresh
    const data = await cloudLoadAll(uid);
    if (data.settings) state.settings = { ...DEFAULT_SETTINGS, ...data.settings };
    state.weights = data.weights || [];
    state.recents = data.recents || [];
    state.exerciseRecents = data.exerciseRecents || [];
    state.plateauNotes = data.plateauNotes || [];
    state.commitments = data.commitments || {};
    state.photos = data.photos || [];
    state.savedMeals = data.savedMeals || [];
    state.customCondiments = data.customCondiments || [];
    state.migrationPrompt = false;
    await loadDay(todayKey());
    refreshWeeklyCache();
    alert('Migration complete! Your data is now in the cloud.');
  } catch (e) {
    alert('Migration failed: ' + e.message);
  } finally {
    state.loadingCloud = false;
    render();
  }
}
async function prevDay() {
  const d = new Date(state.viewDate + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  await loadDay(d.toISOString().slice(0, 10));
}
async function nextDay() {
  if (state.viewDate >= todayKey()) return;
  const d = new Date(state.viewDate + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  await loadDay(d.toISOString().slice(0, 10));
}
async function goToday() { await loadDay(todayKey()); }
function dismissReminder() { state.dismissedReminderDate = todayKey(); save('dismissedReminderDate', state.dismissedReminderDate); render(); }

function openModal(m) {
  state.modal = m;
  state.error = '';
  if (m === 'settings') { state.settingsDraft = { ...state.settings }; state.settingsKeyDraft = state.apiKey; state.showKey = false; }
  if (m === 'exercise') state.exerciseDraft = { name: '', calories: '', duration: '' };
  if (m === 'plateauNote') {
    // Prefill if there's a note today
    const existing = state.plateauNotes.find(n => n.date === todayKey());
    state.plateauDraft = existing ? { triggers: [...existing.triggers], notes: existing.notes } : { triggers: [], notes: '' };
  }
  if (m === 'photoCompare') state.photoCompareSelection = [];
  render();
}
function closeModal() {
  state.modal = null;
  state.searchInput = ''; state.quickInput = '';
  state.searchResults = []; state.servings = '1';
  state.manual = { name: '', calories: '', protein: '', carbs: '', fat: '', category: '', notes: '' };
  state.newWeight = '';
  state.settingsDraft = null;
  state.editingId = null; state.editDraft = null;
  state.exerciseDraft = { name: '', calories: '', duration: '' };
  state.plateauDraft = { triggers: [], notes: '' };
  state.photoCompareSelection = [];
  state.viewingPhotoId = null;
  state.condimentSearch = '';
  state.condimentSearchResults = [];
  state.showCustomCondiment = false;
  state.condimentDraft = { name: '', calories: '', protein: '', carbs: '', fat: '' };
  state.preLogDraft = null;
  state.error = '';
  render();
}

function setMode(m) { state.addMode = m; state.error = ''; render(); }
function updateSettingsDraft(key, value) { state.settingsDraft[key] = parseFloat(value) || 0; }
async function saveSettings() {
  state.settings = { ...state.settingsDraft };
  state.apiKey = state.settingsKeyDraft.trim();
  save('apiKey', state.apiKey); // API key stays local per device
  closeModal();
  try { await cloudSaveSettings(state.user.id, state.settings); }
  catch (e) { alert('Settings save failed: ' + e.message); }
}

async function addFoodEntry(food) {
  const time = new Date().toISOString();
  const entry = {
    time,
    name: food.name,
    calories: Math.round(food.calories || 0),
    protein: Math.round(food.protein || 0),
    carbs: Math.round(food.carbs || 0),
    fat: Math.round(food.fat || 0),
    category: food.category || inferCategory(time),
    notes: food.notes || '',
  };
  // Optimistic local update with temporary id
  const tempId = 'temp_' + Date.now() + '_' + Math.random();
  const tempEntry = { ...entry, id: tempId };
  state.log = [...state.log, tempEntry];
  closeModal();
  try {
    const id = await cloudAddFood(state.user.id, state.viewDate, entry);
    // Replace temp entry with real server id
    state.log = state.log.map(f => f.id === tempId ? { ...f, id } : f);
    // Update recents in cloud
    const clean = { name: entry.name, calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat };
    const filtered = state.recents.filter(r => r.name.toLowerCase() !== clean.name.toLowerCase());
    state.recents = [clean, ...filtered].slice(0, 20);
    await cloudSaveData(state.user.id, 'recents', state.recents);
    render();
    refreshWeeklyCache();
  } catch (e) {
    // Roll back on failure
    state.log = state.log.filter(f => f.id !== tempId);
    alert('Could not save: ' + e.message);
    render();
  }
}

function openEdit(id) {
  const entry = state.log.find(f => f.id === id);
  if (!entry) return;
  state.editingId = id;
  state.editDraft = {
    name: entry.name, calories: entry.calories,
    protein: entry.protein, carbs: entry.carbs, fat: entry.fat,
    category: entry.category || inferCategory(entry.time),
    notes: entry.notes || '',
  };
  state.modal = 'edit';
  render();
}
async function saveEdit() {
  const d = state.editDraft;
  if (!d.name.trim()) { state.error = 'Name required'; render(); return; }
  const updatedEntry = {
    name: d.name.trim(),
    calories: parseFloat(d.calories) || 0,
    protein: parseFloat(d.protein) || 0,
    carbs: parseFloat(d.carbs) || 0,
    fat: parseFloat(d.fat) || 0,
    category: d.category,
    notes: d.notes || '',
  };
  state.log = state.log.map(f => f.id === state.editingId ? { ...f, ...updatedEntry } : f);
  const existing = state.log.find(f => f.id === state.editingId);
  closeModal();
  try {
    await cloudUpdateFood(state.user.id, state.editingId, { ...existing, ...updatedEntry, time: existing?.time });
  } catch (e) { alert('Save failed: ' + e.message); }
}
async function deleteFromEdit() {
  const id = state.editingId;
  state.log = state.log.filter(f => f.id !== id);
  closeModal();
  try { await cloudDeleteFood(state.user.id, id); }
  catch (e) { alert('Delete failed: ' + e.message); }
}

function addFromRecent(i) { if (!state.analyzing) addFoodEntry(state.recents[i]); }
function openPreLog(source, idx) {
  let food;
  if (source === 'mine') {
    // Build pool same way renderAddMode does to match indices
    const q = state.searchInput.trim().toLowerCase();
    const savedMealItems = state.savedMeals.flatMap(m => m.items || []);
    const pool = [...state.recents, ...savedMealItems];
    const seen = new Set();
    const unique = pool.filter(p => {
      const k = (p.name || '').toLowerCase();
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });
    food = unique[idx];
  } else if (source === 'ai') {
    food = state.searchResults[idx];
  }
  if (!food) return;
  state.preLogDraft = {
    name: food.name,
    calories: food.calories || 0,
    protein: food.protein || 0,
    carbs: food.carbs || 0,
    fat: food.fat || 0,
    category: food.category || inferCategory(new Date().toISOString()),
  };
  state.modal = 'preLog';
  render();
}

function confirmPreLog() {
  const d = state.preLogDraft;
  if (!d || !d.name.trim()) return;
  addFoodEntry({
    name: d.name.trim(),
    calories: d.calories,
    protein: d.protein,
    carbs: d.carbs,
    fat: d.fat,
    category: d.category,
  });
  // addFoodEntry calls closeModal which resets state.preLogDraft
}

async function handleQuick() {
  if (!state.quickInput.trim()) return;
  state.analyzing = true; state.error = ''; render();
  try { addFoodEntry(await estimateByName(state.quickInput)); }
  catch (e) { state.error = e.message; state.analyzing = false; render(); }
  finally { state.analyzing = false; }
}
async function handleSearch() {
  if (!state.searchInput.trim()) return;
  state.analyzing = true; state.error = ''; state.searchResults = []; render();
  try { state.searchResults = await searchOptionsAPI(state.searchInput); }
  catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}
async function handlePhoto(file) {
  if (!file) return;
  state.analyzing = true; state.error = ''; render();
  try {
    // Compress the image first so it fits within API limits (~5MB base64)
    const compressedDataUrl = await compressImage(file, 1200, 0.8);
    const base64 = compressedDataUrl.split(',')[1];
    addFoodEntry(await readLabel(base64, 'image/jpeg', parseFloat(state.servings) || 1));
  } catch (e) { state.error = e.message; state.analyzing = false; render(); }
  finally { state.analyzing = false; }
}
function handleManualAdd() {
  if (!state.manual.name.trim() || !state.manual.calories) { state.error = 'Name and calories required'; render(); return; }
  addFoodEntry({
    name: state.manual.name.trim(),
    calories: parseFloat(state.manual.calories) || 0,
    protein: parseFloat(state.manual.protein) || 0,
    carbs: parseFloat(state.manual.carbs) || 0,
    fat: parseFloat(state.manual.fat) || 0,
    category: state.manual.category || inferCategory(new Date().toISOString()),
    notes: state.manual.notes,
  });
}

async function addWater(amount) {
  state.water = Math.max(0, state.water + amount);
  render();
  try { await cloudSaveWater(state.user.id, state.viewDate, state.water); }
  catch (e) { console.error('Water save failed', e); }
}

async function addExerciseEntry(ex) {
  const entry = { time: new Date().toISOString(), name: ex.name, calories: Math.round(ex.calories || 0), duration: Math.round(ex.duration || 0) };
  const tempId = 'temp_' + Date.now();
  state.exercise = [...state.exercise, { ...entry, id: tempId }];
  // Update exercise recents
  const clean = { name: entry.name, calories: entry.calories, duration: entry.duration };
  const filtered = state.exerciseRecents.filter(r => r.name.toLowerCase() !== clean.name.toLowerCase());
  state.exerciseRecents = [clean, ...filtered].slice(0, 15);
  closeModal();
  try {
    const id = await cloudAddExercise(state.user.id, state.viewDate, entry);
    state.exercise = state.exercise.map(e => e.id === tempId ? { ...e, id } : e);
    await cloudSaveData(state.user.id, 'exerciseRecents', state.exerciseRecents);
    render();
  } catch (e) {
    state.exercise = state.exercise.filter(ex => ex.id !== tempId);
    alert('Save failed: ' + e.message);
    render();
  }
}
async function deleteExercise(id) {
  state.exercise = state.exercise.filter(e => e.id !== id);
  render();
  try { await cloudDeleteExercise(state.user.id, id); }
  catch (e) { console.error(e); }
}
function handleExerciseManual() {
  const d = state.exerciseDraft;
  if (!d.name.trim() || !d.calories) { state.error = 'Activity name and calories required'; render(); return; }
  addExerciseEntry({ name: d.name.trim(), calories: parseFloat(d.calories) || 0, duration: parseFloat(d.duration) || 0 });
}
async function handleExerciseEstimate() {
  if (!state.exerciseDraft.name.trim()) return;
  state.analyzing = true; state.error = ''; render();
  try { addExerciseEntry(await estimateExercise(state.exerciseDraft.name)); }
  catch (e) { state.error = e.message; state.analyzing = false; render(); }
  finally { state.analyzing = false; }
}
function addExerciseFromRecent(i) { if (!state.analyzing) addExerciseEntry(state.exerciseRecents[i]); }

function updateWeightButton() {
  const btn = document.getElementById('weight-save-btn');
  const err = document.getElementById('weight-error');
  if (btn) {
    if (state.newWeight && state.newWeight.trim()) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
  if (err) err.style.display = 'none';
}

async function saveWeight() {
  const w = parseFloat(state.newWeight);
  const errEl = document.getElementById('weight-error');
  if (isNaN(w)) { if (errEl) { errEl.textContent = 'Enter a number.'; errEl.style.display = 'block'; } return; }
  if (w < 50 || w > 600) { if (errEl) { errEl.textContent = `${w} lbs is out of range (50-600).`; errEl.style.display = 'block'; } return; }
  const today = todayKey();
  state.weights = [...state.weights.filter(x => x.date !== today), { date: today, weight: w }].sort((a, b) => a.date.localeCompare(b.date));
  closeModal();
  try { await cloudSaveWeight(state.user.id, today, w); }
  catch (e) { alert('Save failed: ' + e.message); }
}

// Plateau notes
function toggleTrigger(t) {
  const i = state.plateauDraft.triggers.indexOf(t);
  if (i === -1) state.plateauDraft.triggers.push(t);
  else state.plateauDraft.triggers.splice(i, 1);
  render();
}
async function savePlateauNote() {
  const today = todayKey();
  const cw = state.weights.length ? state.weights[state.weights.length - 1].weight : state.settings.startWeight;
  const existing = state.plateauNotes.findIndex(n => n.date === today);
  const note = { id: Date.now(), date: today, weight: cw, triggers: [...state.plateauDraft.triggers], notes: state.plateauDraft.notes };
  if (existing !== -1) state.plateauNotes[existing] = note;
  else state.plateauNotes = [...state.plateauNotes, note];
  closeModal();
  try { await cloudSaveData(state.user.id, 'plateauNotes', state.plateauNotes); }
  catch (e) { alert('Save failed: ' + e.message); }
}
async function deletePlateauNote(id) {
  state.plateauNotes = state.plateauNotes.filter(n => n.id !== id);
  render();
  try { await cloudSaveData(state.user.id, 'plateauNotes', state.plateauNotes); }
  catch (e) { console.error(e); }
}

// Commit
async function toggleCommit() {
  const today = todayKey();
  state.commitments = { ...state.commitments };
  if (state.commitments[today]) delete state.commitments[today];
  else state.commitments[today] = true;
  render();
  try { await cloudSaveData(state.user.id, 'commitments', state.commitments); }
  catch (e) { console.error(e); }
}

// Photos
async function handlePhotoUpload(file) {
  if (!file) return;
  try {
    const dataUrl = await compressImage(file);
    const photo = { id: Date.now(), date: todayKey(), dataUrl };
    state.photos = [...state.photos, photo];
    render();
    try { await cloudSaveData(state.user.id, 'photos', state.photos); }
    catch (e) {
      state.photos = state.photos.filter(p => p.id !== photo.id);
      alert('Photo upload failed (maybe too large): ' + e.message);
      render();
    }
  } catch (e) {
    alert('Could not process image: ' + e.message);
  }
}
function viewPhoto(id) { state.viewingPhotoId = id; state.modal = 'photoView'; render(); }
async function deletePhoto(id) {
  state.photos = state.photos.filter(p => p.id !== id);
  closeModal();
  try { await cloudSaveData(state.user.id, 'photos', state.photos); }
  catch (e) { console.error(e); }
}
function togglePhotoSelect(id) {
  const i = state.photoCompareSelection.indexOf(id);
  if (i !== -1) state.photoCompareSelection.splice(i, 1);
  else if (state.photoCompareSelection.length < 2) state.photoCompareSelection.push(id);
  render();
}

// Saved meals
function openMealBuilder() {
  state.mealBuilder = { name: '', category: '', items: [] };
  state.editingMealId = null;
  state.modal = 'mealBuilder';
  render();
}
function editSavedMeal(id) {
  const m = state.savedMeals.find(x => x.id === id);
  if (!m) return;
  state.mealBuilder = { name: m.name, category: m.category || '', items: [...m.items] };
  state.editingMealId = id;
  state.modal = 'mealBuilder';
  render();
}
function addToMealBuilder(recentIdx) {
  const r = state.recents[recentIdx];
  if (!r) return;
  state.mealBuilder.items = [...state.mealBuilder.items, { ...r }];
  render();
}
function removeMealItem(i) {
  state.mealBuilder.items = state.mealBuilder.items.filter((_, idx) => idx !== i);
  render();
}
async function saveMealBuilder() {
  const m = state.mealBuilder;
  if (!m.name.trim() || m.items.length === 0) return;
  if (state.editingMealId) {
    state.savedMeals = state.savedMeals.map(x => x.id === state.editingMealId ? { ...x, name: m.name.trim(), category: m.category, items: m.items } : x);
  } else {
    state.savedMeals = [...state.savedMeals, { id: Date.now(), name: m.name.trim(), category: m.category, items: m.items }];
  }
  state.modal = 'add';
  state.addMode = 'meals';
  state.mealBuilder = { name: '', category: '', items: [] };
  state.editingMealId = null;
  render();
  try { await cloudSaveData(state.user.id, 'savedMeals', state.savedMeals); }
  catch (e) { alert('Save failed: ' + e.message); }
}
async function deleteSavedMeal() {
  if (!state.editingMealId) return;
  state.savedMeals = state.savedMeals.filter(x => x.id !== state.editingMealId);
  state.modal = 'add';
  state.addMode = 'meals';
  state.mealBuilder = { name: '', category: '', items: [] };
  state.editingMealId = null;
  render();
  try { await cloudSaveData(state.user.id, 'savedMeals', state.savedMeals); }
  catch (e) { console.error(e); }
}
async function logSavedMeal(id) {
  const m = state.savedMeals.find(x => x.id === id);
  if (!m) return;
  const cat = m.category || inferCategory(new Date().toISOString());
  closeModal();
  // Add each item sequentially to avoid race conditions with server ids
  for (const it of m.items) {
    const entry = {
      time: new Date().toISOString(),
      name: it.name,
      calories: Math.round(it.calories || 0),
      protein: Math.round(it.protein || 0),
      carbs: Math.round(it.carbs || 0),
      fat: Math.round(it.fat || 0),
      category: cat,
      notes: '',
    };
    const tempId = 'temp_' + Date.now() + '_' + Math.random();
    state.log = [...state.log, { ...entry, id: tempId }];
    render();
    try {
      const realId = await cloudAddFood(state.user.id, state.viewDate, entry);
      state.log = state.log.map(f => f.id === tempId ? { ...f, id: realId } : f);
    } catch (e) {
      state.log = state.log.filter(f => f.id !== tempId);
      alert('Failed adding "' + entry.name + '": ' + e.message);
      render();
      return;
    }
  }
  render();
}

// Condiments
function logCondiment(idx) {
  const all = [...state.customCondiments, ...DEFAULT_CONDIMENTS];
  const c = all[idx];
  if (!c) return;
  addFoodEntry({
    name: c.name,
    calories: c.calories,
    protein: c.protein,
    carbs: c.carbs,
    fat: c.fat,
    category: 'snack',
  });
}
async function handleCondimentSearch() {
  if (!state.condimentSearch.trim()) return;
  state.analyzing = true; state.error = ''; state.condimentSearchResults = []; render();
  try { state.condimentSearchResults = await searchCondiment(state.condimentSearch); }
  catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}
function logCondimentResult(i) {
  const r = state.condimentSearchResults[i];
  if (!r) return;
  addFoodEntry({
    name: r.name,
    calories: r.calories,
    protein: r.protein,
    carbs: r.carbs,
    fat: r.fat,
    category: 'snack',
  });
}
async function pinCondimentResult(i) {
  const r = state.condimentSearchResults[i];
  if (!r) return;
  if (state.customCondiments.some(c => c.name.toLowerCase() === r.name.toLowerCase())) {
    state.error = 'Already pinned.';
    render();
    return;
  }
  state.customCondiments = [{ name: r.name, calories: r.calories, protein: r.protein, carbs: r.carbs, fat: r.fat }, ...state.customCondiments];
  render();
  try { await cloudSaveData(state.user.id, 'customCondiments', state.customCondiments); }
  catch (e) { console.error(e); }
}
async function saveCustomCondiment() {
  const d = state.condimentDraft;
  if (!d.name.trim() || !d.calories) return;
  state.customCondiments = [{
    name: d.name.trim(),
    calories: parseFloat(d.calories) || 0,
    protein: parseFloat(d.protein) || 0,
    carbs: parseFloat(d.carbs) || 0,
    fat: parseFloat(d.fat) || 0,
  }, ...state.customCondiments];
  state.condimentDraft = { name: '', calories: '', protein: '', carbs: '', fat: '' };
  state.showCustomCondiment = false;
  render();
  try { await cloudSaveData(state.user.id, 'customCondiments', state.customCondiments); }
  catch (e) { alert('Save failed: ' + e.message); }
}
async function deleteCustomCondiment(i) {
  state.customCondiments = state.customCondiments.filter((_, idx) => idx !== i);
  render();
  try { await cloudSaveData(state.user.id, 'customCondiments', state.customCondiments); }
  catch (e) { console.error(e); }
}

// =====================
// INIT
// =====================
async function init() {
  render(); // shows boot screen
  try {
    const { data } = await sb.auth.getSession();
    if (data?.session?.user) {
      state.authReady = true;
      await onSignedIn(data.session.user);
    } else {
      state.authReady = true;
      render();
    }
  } catch (e) {
    console.error('init failed', e);
    state.authReady = true;
    render();
  }

  // React to auth state changes (sign in on another tab, sign out, token refresh)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user && !state.user) {
      await onSignedIn(session.user);
    } else if (event === 'SIGNED_OUT') {
      state.user = null;
      render();
    }
  });
}

init();
</script>
