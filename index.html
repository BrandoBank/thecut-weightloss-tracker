<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: #000; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  body { min-height: 100vh; min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }
  button, input, textarea, select { font-family: inherit; color: inherit; background: transparent; border: none; outline: none; -webkit-appearance: none; appearance: none; }
  button { cursor: pointer; }
  input, textarea { width: 100%; }
  :root {
    --bg: #000; --surface: #0a0a0a; --surface-2: #141414; --surface-3: #1a1a1a;
    --border: #262626; --border-2: #333;
    --text: #e5e5e5; --text-2: #a3a3a3; --text-3: #737373; --text-dim: #525252;
    --lime: #c4ff3f; --lime-bright: #d4ff3f; --lime-dim: rgba(196, 255, 63, 0.15); --lime-glow: rgba(196, 255, 63, 0.35);
    --orange: #fb923c; --blue: #60a5fa; --teal: #2dd4bf; --red: #f87171; --green: #4ade80;
  }
  .display { font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .mono { font-family: 'SF Mono', Menlo, Monaco, monospace; letter-spacing: 0.02em; }
  .lime { color: var(--lime); } .text-2 { color: var(--text-2); } .text-3 { color: var(--text-3); } .dim { color: var(--text-dim); }
  .small { font-size: 12px; }
  .tiny { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
  .row { display: flex; align-items: center; }
  .row.between { justify-content: space-between; }
  .col { display: flex; flex-direction: column; }
  .flex1 { flex: 1; min-width: 0; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .space-y-2 > * + * { margin-top: 8px; } .space-y-3 > * + * { margin-top: 12px; } .space-y-4 > * + * { margin-top: 16px; }
  .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
  .mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}

  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; padding-top: max(10px, env(safe-area-inset-top)); background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; }
  .topbar-logo { width: 28px; height: 28px; }
  .topbar-title { font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .topbar-title .lime { color: var(--lime); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .pill-stat { display: flex; flex-direction: column; align-items: flex-end; }
  .pill-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); font-weight: 600; }
  .pill-stat-value { font-family: 'SF Pro Display'; font-weight: 700; font-size: 14px; color: var(--text); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--lime); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }

  .status-strip { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); border-left: 3px solid var(--lime); }
  .status-num { font-family: 'SF Pro Display'; font-weight: 800; font-size: 32px; color: var(--lime); line-height: 1; letter-spacing: -0.02em; }
  .status-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); font-weight: 600; margin-top: 2px; }
  .status-headline { font-weight: 600; font-size: 14px; color: var(--text); }
  .status-subline { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .status-streak { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border-2); border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--lime); flex-shrink: 0; }

  .tabbar { display: flex; align-items: center; background: var(--bg); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0 8px; position: sticky; z-index: 40; }
  .tabbar::-webkit-scrollbar { display: none; }
  .tab { display: flex; align-items: center; gap: 6px; padding: 14px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--lime); border-bottom-color: var(--lime); }

  .body { flex: 1; padding: 16px; padding-bottom: 100px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .card.tight { padding: 12px; }
  .card.glow { border-color: var(--lime); box-shadow: 0 0 0 1px var(--lime-glow); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); font-weight: 600; }

  .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-tile-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .stat-tile-value { font-family: 'SF Pro Display'; font-weight: 700; font-size: 24px; color: var(--text); margin-top: 4px; line-height: 1; letter-spacing: -0.02em; }
  .stat-tile-value .unit { font-size: 12px; color: var(--text-3); font-weight: 600; margin-left: 3px; }
  .stat-tile-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .stat-tile.lime .stat-tile-value { color: var(--lime); }
  .stat-tile.orange .stat-tile-value { color: var(--orange); }

  .ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--surface-3); stroke-linecap: round; }
  .ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; pointer-events: none; }
  .btn-primary { background: var(--lime); color: #000; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { color: var(--text-2); }
  .btn-danger { background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }
  .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }
  .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display:inline-flex; align-items:center; justify-content:center; }

  .field-label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); font-weight: 600; margin-bottom: 6px; }
  .field { width: 100%; padding: 14px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); }
  .field:focus { border-color: var(--lime); }
  .field::placeholder { color: var(--text-dim); }
  .field-wrap { position: relative; }
  .field-suffix { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 13px; pointer-events: none; }
  textarea.field { resize: vertical; min-height: 60px; font-family: inherit; }

  .segments { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px; padding: 4px; background: var(--surface-2); border-radius: 10px; }
  .seg { padding: 10px 8px; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-3); text-align: center; }
  .seg.active { background: var(--surface); color: var(--lime); }

  .result { display: block; width: 100%; text-align: left; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .result:active { border-color: var(--border-2); }

  .hscroll { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 4px; }
  .hscroll::-webkit-scrollbar { display: none; }
  .pill { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; color: var(--text-2); white-space: nowrap; flex-shrink: 0; }
  .pill.active { background: var(--lime-dim); border-color: var(--lime); color: var(--lime); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { width: 100%; max-width: 600px; background: var(--surface); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; max-height: 90vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .sheet-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px 24px; }

  .banner { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; font-size: 13px; }
  .banner-warn { background: rgba(251, 146, 60, 0.08); border: 1px solid rgba(251, 146, 60, 0.3); color: var(--orange); }
  .banner-success { background: rgba(196, 255, 63, 0.08); border: 1px solid var(--lime); color: var(--lime); }
  .error { color: var(--red); font-size: 12px; padding: 10px 12px; background: rgba(248, 113, 113, 0.05); border: 1px solid rgba(248, 113, 113, 0.2); border-radius: 8px; margin-top: 8px; }

  .welcome { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .welcome-inner { width: 100%; max-width: 380px; }
  .welcome-logo { display: block; margin: 0 auto 16px; width: 96px; height: 96px; }
  .welcome-title { text-align: center; font-size: 36px; margin-bottom: 8px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; transform-origin: center; }

  .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 32px 20px; color: var(--text-3); }

  .meal-section { margin-top: 20px; }
  .meal-section-head { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 6px; }
  .meal-section-label { display: flex; align-items: center; gap: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .meal-section-cals { font-family: 'SF Mono', monospace; font-size: 11px; color: var(--text-3); }
  .food-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 6px; }
  .food-row-name { font-size: 13px; font-weight: 500; }
  .food-row-macros { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: 'SF Mono', monospace; }
  .food-row-cal { font-family: 'SF Pro Display'; font-weight: 700; font-size: 16px; color: var(--lime); }

  .fab { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--lime); color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(196, 255, 63, 0.25), 0 0 0 1px rgba(196, 255, 63, 0.5); z-index: 30; }
  .fab:active { transform: scale(0.95); }

  /* Toast notifications */
  .toast-stack { position: fixed; bottom: max(80px, calc(env(safe-area-inset-bottom) + 72px)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; align-items: center; z-index: 200; pointer-events: none; width: calc(100% - 32px); max-width: 360px; }
  .toast { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; line-height: 1.3; background: var(--surface-2, #1a1a1a); border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.5); pointer-events: auto; animation: toastIn 0.2s ease; width: 100%; }
  .toast-success { border-color: var(--lime); }
  .toast-error { border-color: #ef4444; }
  .toast-info { border-color: var(--border); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Pull-to-refresh */
  #ptr-indicator { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(-48px); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; z-index: 150; transition: transform 0.15s ease; pointer-events: none; }
  #ptr-indicator.visible { transform: translateX(-50%) translateY(12px); }

  /* Shimmer skeleton */
  @keyframes shimmer { 0% { background-position: -300px 0; } 100% { background-position: 300px 0; } }
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%); background-size: 600px 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }

  /* Long-press delete */
  .food-row-deleting { border-color: #ef4444 !important; background: rgba(239,68,68,0.08) !important; }
  .food-row-delete-btn { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

  /* Stepper */
  .stepper { display: flex; align-items: center; gap: 0; background: var(--surface-2); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .stepper-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--lime); }
  .stepper-btn:active { background: var(--surface-3); }
  .stepper-input { flex: 1; text-align: center; font-family: 'SF Pro Display'; font-weight: 700; font-size: 18px; padding: 12px 8px; border: none; }
  .stepper-input:focus { outline: none; }
</style>
</head>

const todayKey = () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0, 10); };

const haptic = (ms = 10) => { try { navigator.vibrate?.(ms); } catch {} };

const inferCategory = (iso) => {
  const h = new Date(iso).getHours() + new Date(iso).getMinutes() / 60;
  if (h >= 4 && h < 10.5) return 'breakfast';
  if (h >= 10.5 && h < 14.5) return 'lunch';
  if (h >= 14.5 && h < 20.5) return 'dinner';
  return 'snack';
};

// Container lives outside #app so render() never destroys it
const _toastContainer = document.createElement('div');
_toastContainer.className = 'toast-stack';

// Pull-to-refresh
const _ptrEl = document.createElement('div');
_ptrEl.id = 'ptr-indicator';
_ptrEl.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.65"/></svg> Release to refresh';
document.body.appendChild(_ptrEl);

let _ptrStartY = 0, _ptrPulling = false, _ptrTriggered = false;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && state.activeTab === 'home') {
    _ptrStartY = e.touches[0].clientY;
    _ptrPulling = true;
    _ptrTriggered = false;
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!_ptrPulling) return;
  const dy = e.touches[0].clientY - _ptrStartY;
  if (dy > 60 && !_ptrTriggered) {
    _ptrTriggered = true;
    _ptrEl.classList.add('visible');
  } else if (dy <= 60) {
    _ptrTriggered = false;
    _ptrEl.classList.remove('visible');
  }
}, { passive: true });
document.addEventListener('touchend', async () => {
  if (_ptrPulling && _ptrTriggered) {
    _ptrEl.classList.remove('visible');
    if (state.user) {
      await loadDay(state.viewDate);
      toast('Refreshed!', 'success');
    }
  }
  _ptrPulling = false;
  _ptrTriggered = false;
});

let _toastId = 0;
function toast(msg, type = 'info') {
  const id = ++_toastId;
  state.toasts.push({ id, msg, type });
  _renderToastContainer();
  setTimeout(() => {
    state.toasts = state.toasts.filter(t => t.id !== id);
    _renderToastContainer();
  }, 3000);
}

function _renderToastContainer() {
  const icons = {
    success: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c4ff3f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    error:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    info:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  };
  _toastContainer.innerHTML = state.toasts.map(t => `
    <div class="toast toast-${t.type}">
      ${icons[t.type] || icons.info}
      <span style="flex:1">${esc(t.msg)}</span>
    </div>`).join('');
}

async function cloudLoadAll(userId) {
  const out = { settings: null, weights: [], recents: [], exerciseRecents: [], plateauNotes: [], commitments: {}, photos: [], savedMeals: [], customCondiments: [], savedDayPlans: [] };
  const { data: settingsRow } = await sb.from('user_settings').select('settings').eq('user_id', userId).maybeSingle();
  if (settingsRow) out.settings = settingsRow.settings;
  const { data: weights } = await sb.from('weights').select('date, weight').eq('user_id', userId).order('date');
  out.weights = weights || [];
  const { data: kv } = await sb.from('user_data').select('key, value').eq('user_id', userId);
  if (kv) for (const row of kv) if (row.key in out) out[row.key] = row.value;
  return out;
}
async function cloudLoadDay(userId, date) {
  const [foodRes, exRes, waterRes] = await Promise.all([
    sb.from('food_log').select('id, entry').eq('user_id', userId).eq('date', date).order('created_at'),
    sb.from('exercise_log').select('id, entry').eq('user_id', userId).eq('date', date).order('created_at'),
    sb.from('water').select('amount').eq('user_id', userId).eq('date', date).maybeSingle(),
  ]);
  return { log: (foodRes.data || []).map(r => ({ ...r.entry, id: r.id })), exercise: (exRes.data || []).map(r => ({ ...r.entry, id: r.id })), water: waterRes.data?.amount || 0 };
}
async function cloudSaveSettings(uid, s) { await sb.from('user_settings').upsert({ user_id: uid, settings: s }); }
async function cloudSaveData(uid, k, v) { await sb.from('user_data').upsert({ user_id: uid, key: k, value: v }); }

// =====================
// COMPUTED
// =====================
function computed() {
  const t = state.log.reduce((a, f) => ({
    calories: a.calories + (f.calories || 0),
    protein: a.protein + (f.protein || 0),
    carbs: a.carbs + (f.carbs || 0),
    fat: a.fat + (f.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
  const burned = state.exercise.reduce((a, e) => a + (e.calories || 0), 0);
  const netCalories = t.calories - burned;
  const cw = state.weights.length ? state.weights[state.weights.length - 1].weight : state.settings.startWeight;
  const lost = (state.settings.startWeight - cw).toFixed(1);
  const toGoal = (cw - state.settings.goalWeight).toFixed(1);
  const inPlateau = cw >= state.settings.plateauLow && cw <= state.settings.plateauHigh;
  const remaining = state.settings.calorieTarget - netCalories;
  const progressPct = Math.min(((state.settings.startWeight - cw) / (state.settings.startWeight - state.settings.goalWeight)) * 100, 100);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutoffKey = cutoff.toISOString().slice(0, 10);
  const recentWeights = state.weights.filter(w => w.date >= cutoffKey);
  const weeklyAvg = recentWeights.length ? (recentWeights.reduce((a, w) => a + w.weight, 0) / recentWeights.length) : null;

  // Streak from cache
  let streak = 0;
  const byDate = {};
  for (const d of state.weeklyCache) byDate[d.date] = d;
  const d = new Date(); d.setDate(d.getDate() - 1);
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().slice(0, 10);
    const rec = byDate[key];
    if (!rec || !rec.logCount) break;
    if (rec.cals > state.settings.calorieTarget) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }

  // Readiness score (lightweight): 100 baseline, -10 if log incomplete, +5 streak, etc.
  let readiness = 70;
  if (state.log.length > 0) readiness += 10;
  if (state.water >= state.settings.waterTarget * 0.5) readiness += 5;
  if (streak >= 1) readiness += Math.min(streak * 2, 15);
  if (t.calories <= state.settings.calorieTarget) readiness += 5;
  readiness = Math.min(readiness, 100);

  // 14-day rolling weight trend & ETA to goal
  const cutoff14 = new Date(); cutoff14.setDate(cutoff14.getDate() - 14);
  const cutoff14Key = cutoff14.toISOString().slice(0, 10);
  const weights14 = state.weights.filter(w => w.date >= cutoff14Key).sort((a, b) => a.date.localeCompare(b.date));
  let goalEta = null;
  if (weights14.length >= 4) {
    // Least-squares slope (lbs/day)
    const n = weights14.length;
    const xs = weights14.map((_, i) => i);
    const ys = weights14.map(w => w.weight);
    const xMean = xs.reduce((a, x) => a + x, 0) / n;
    const yMean = ys.reduce((a, y) => a + y, 0) / n;
    const slope = xs.reduce((a, x, i) => a + (x - xMean) * (ys[i] - yMean), 0) /
                  xs.reduce((a, x) => a + (x - xMean) ** 2, 0);
    if (slope < -0.01) { // losing weight
      const daysToGoal = Math.round((cw - state.settings.goalWeight) / Math.abs(slope));
      const eta = new Date();
      eta.setDate(eta.getDate() + daysToGoal);
      goalEta = eta.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
  }

  return { totals: t, burned, netCalories, currentWeight: cw, lost, toGoal, inPlateau, remaining, progressPct, weeklyAvg, streak, readiness, goalEta };
}

// =====================
// RING SVG HELPER
// =====================
function ring(value, max, size, stroke, color = 'var(--lime)') {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(value / max, 1));
  const off = c - (pct * c);
  return `<svg class="ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="ring-track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/>
    <circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
  </svg>`;
}

function render() {
  const active = document.activeElement;
  const focusedId = active?.id;
  const selStart = active?.selectionStart;
  const selEnd = active?.selectionEnd;
  if (!state.authReady) {
    root.innerHTML = renderBoot();
  } else if (!state.user) {
    root.innerHTML = renderAuth();
  } else if (state.loadingCloud) {
    root.innerHTML = renderBoot('Loading your data…');
  } else {
    root.innerHTML = renderApp();
  }
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) {
      el.focus();
      if (selStart != null && typeof el.setSelectionRange === 'function') {
        try { el.setSelectionRange(selStart, selEnd); } catch {}
      }
    }
  }
}

function renderStatusStrip(c) {
  let headline, subline;
  if (c.inPlateau) {
    headline = 'In plateau zone';
    subline = `${c.currentWeight} lbs · stay disciplined`;
  } else if (c.netCalories > state.settings.calorieTarget) {
    headline = 'Over today';
    subline = `${Math.abs(c.remaining)} cal over · adjust tomorrow`;
  } else if (state.log.length === 0) {
    headline = 'Fresh slate';
    subline = 'Start logging your first meal';
  } else {
    headline = 'On pace';
    subline = `${c.remaining} cal remaining today`;
  }
  return `
    <div class="status-strip">
      <div>
        <div class="status-num">${c.readiness}</div>
        <div class="status-label">Score</div>
      </div>
      <div class="flex1">
        <div class="status-headline">${esc(headline)}</div>
        <div class="status-subline">${esc(subline)}</div>
      </div>
      <div class="status-streak">
        ${icon('flame', 12, '#c4ff3f')} ${c.streak} ${c.streak === 1 ? 'day' : 'days'}
      </div>
    </div>
  `;
}

function renderTab(tab, c) {
  switch (tab) {
    case 'home':     return renderHomeTab(c);
    case 'log':      return renderLogTab(c);
    case 'exercise': return renderExerciseTab(c);
    case 'weight':   return renderWeightTab(c);
    case 'meals':    return renderMealsTab(c);
    case 'warroom':  return renderWarRoomTab(c);
    case 'settings': return renderSettingsTab(c);
    default:         return renderHomeTab(c);
  }
}

function renderMacroDonut(protein, carbs, fat) {
  const pCal = protein * 4;
  const cCal = carbs * 4;
  const fCal = fat * 9;
  const total = pCal + cCal + fCal;
  if (total === 0) return '';

  // SVG donut: 3 segments, clockwise from top
  const size = 56, stroke = 8, r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pPct = pCal / total, cPct = cCal / total, fPct = fCal / total;

  // Each segment: dasharray=segment_length, dashoffset=-(prior segments)
  const pLen = pPct * circ, cLen = cPct * circ, fLen = fPct * circ;
  const gap = 1.5; // small gap between segments
  const cx = size / 2, cy = size / 2;

  function segment(len, offset, color) {
    if (len < 1) return '';
    const actualLen = Math.max(0, len - gap);
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${actualLen.toFixed(2)} ${(circ - actualLen).toFixed(2)}"
      stroke-dashoffset="${(-offset + circ / 4).toFixed(2)}"
      stroke-linecap="butt"/>`;
  }

  const svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${stroke}"/>
    ${segment(pLen, 0, 'var(--lime)')}
    ${segment(cLen, pLen, 'var(--blue)')}
    ${segment(fLen, pLen + cLen, 'var(--orange)')}
  </svg>`;

  return `<div class="row" style="align-items:center;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--surface-2)">
    ${svg}
    <div class="row" style="gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--lime)"></div>
        <div class="tiny text-3">P <span style="color:var(--text-2)">${Math.round(pPct*100)}%</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--blue)"></div>
        <div class="tiny text-3">C <span style="color:var(--text-2)">${Math.round(cPct*100)}%</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--orange)"></div>
        <div class="tiny text-3">F <span style="color:var(--text-2)">${Math.round(fPct*100)}%</span></div>
      </div>
    </div>
  </div>`;
}

function macroBar(label, value, target, color, ico) {
  const pct = Math.min((value / target) * 100, 100);
  return `
    <div>
      <div class="row between mb-1">

        <div class="small mono text-3">${Math.round(value)}/${target}<span class="dim">g</span></div>
      </div>
      <div style="height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden">
        <div style="height:100%;background:${color};width:${pct}%;transition:width 0.4s"></div>
      </div>
    </div>
  `;
}

                <div class="result-sub mt-1"><span class="lime">${f.calories}</span> cal · P${f.protein} C${f.carbs} F${f.fat}</div>

            `;
          }).join('')}

        ${state.analyzing ? `${icon('loader', 16, 'currentColor', 2, 'spin')} Searching…` : `${icon('sparkles', 14)} ${mineMatches.length > 0 ? 'Search with AI' : 'Search with AI for "' + esc(q) + '"'}`}

  const grouped = {};
  for (const f of state.log) {
    const cat = f.category || inferCategory(f.time);
    grouped[cat] = grouped[cat] || [];
    grouped[cat].push(f);
  }
  return Object.keys(CATEGORIES).filter(k => grouped[k]).map(k => {
    const items = grouped[k];
    const sub = items.reduce((a, f) => a + (f.calories || 0), 0);
    return `
      <div class="meal-section">

            <div class="cat-dot" style="background:${CATEGORIES[k].color}"></div>

  }).join('');
}

function renderWeightSparkline() {
  const recent = state.weights.slice(-14);
  if (recent.length < 2) return '';
  const min = Math.min(...recent.map(w => w.weight)) - 1;
  const max = Math.max(...recent.map(w => w.weight)) + 1;
  const w = 280, h = 60;
  const pts = recent.map((wt, i) => {
    const x = (i / (recent.length - 1)) * w;
    const y = h - ((wt.weight - min) / (max - min)) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const plateauLow = state.settings.plateauLow;
  const plateauHigh = state.settings.plateauHigh;
  const pyTop = h - ((plateauHigh - min) / (max - min)) * h;
  const pyBot = h - ((plateauLow - min) / (max - min)) * h;
  const showPlateau = plateauLow >= min && plateauHigh <= max;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="60">
    ${showPlateau ? `<rect x="0" y="${pyTop}" width="${w}" height="${pyBot - pyTop}" fill="rgba(251,146,60,0.1)"/>` : ''}
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(--lime)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${recent.map((wt, i) => {
      const x = (i / (recent.length - 1)) * w;
      const y = h - ((wt.weight - min) / (max - min)) * h;
      return `<circle cx="${x}" cy="${y}" r="2" fill="var(--lime)"/>`;
    }).join('')}
  </svg>`;
}

async function callClaude(body) {
  if (!state.apiKey) throw new Error('Add your Anthropic API key in Settings.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error('API ' + res.status + ': ' + t.slice(0, 200));
  }
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

function extractJSON(text) {
  if (!text) return null;
  text = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(text); } catch {}
  const arrayMatch = text.match(/\[[\s\S]*\]/);
  if (arrayMatch) { try { return JSON.parse(arrayMatch[0]); } catch {} }
  const objMatch = text.match(/\{[\s\S]*\}/);
  if (objMatch) { try { return JSON.parse(objMatch[0]); } catch {} }
  return null;
}

async function compressImage(file, maxDim = 1200, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = h * (maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = w * (maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function openWeeklyReview() {
  state.modal = 'weeklyReview';
  state.weeklyReview = null;
  state.weeklyReviewLoading = true;
  render();

  try {
    // Gather last 7 days of data
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 6);
    const cutoffKey = cutoff.toISOString().slice(0, 10);
    const todayKey = new Date().toISOString().slice(0, 10);

    const [foodRes, exRes] = await Promise.all([
      sb.from('food_log').select('date, entry').eq('user_id', state.user.id).gte('date', cutoffKey),
      sb.from('exercise_log').select('date, entry').eq('user_id', state.user.id).gte('date', cutoffKey),
    ]);

    const byDate = {};
    for (const r of (foodRes.data || [])) {
      byDate[r.date] = byDate[r.date] || { date: r.date, cals: 0, burned: 0, logCount: 0, foods: [] };
      byDate[r.date].cals += r.entry?.calories || 0;
      byDate[r.date].logCount++;
      if (r.entry?.name) byDate[r.date].foods.push(r.entry.name);
    }
    for (const r of (exRes.data || [])) {
      byDate[r.date] = byDate[r.date] || { date: r.date, cals: 0, burned: 0, logCount: 0, foods: [] };
      byDate[r.date].burned += r.entry?.calories || 0;
    }

    const days = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
    const loggedDays = days.filter(d => d.logCount > 0);
    const target = state.settings.calorieTarget;
    const avgCals = loggedDays.length ? Math.round(loggedDays.reduce((a, d) => a + d.cals, 0) / loggedDays.length) : 0;
    const avgBurned = loggedDays.length ? Math.round(loggedDays.reduce((a, d) => a + d.burned, 0) / loggedDays.length) : 0;
    const totalDeficit = loggedDays.reduce((a, d) => a + Math.max(0, target - (d.cals - d.burned)), 0);

    // Weight change over the week
    const weekWeights = state.weights.filter(w => w.date >= cutoffKey).sort((a, b) => a.date.localeCompare(b.date));
    const weightChange = weekWeights.length >= 2
      ? (weekWeights[weekWeights.length - 1].weight - weekWeights[0].weight).toFixed(1)
      : null;

    // Streak (reuse computed logic)
    const c = computed();
    const streak = c.streak;

    // Plateau days
    const plateauDays = days.filter(d => {
      const w = state.weights.find(ww => ww.date === d.date);
      return w && w.weight >= state.settings.plateauLow && w.weight <= state.settings.plateauHigh;
    }).length;

    // Top 3 most-logged foods
    const foodCounts = {};
    for (const d of days) {
      for (const name of (d.foods || [])) {
        const key = name.toLowerCase().trim();
        foodCounts[key] = (foodCounts[key] || { name, count: 0 });
        foodCounts[key].count++;
      }
    }
    const topFoods = Object.values(foodCounts).sort((a, b) => b.count - a.count).slice(0, 3);

    // AI reflection (optional — skip if no API key)
    let reflection = null;
    if (state.apiKey) {
      try {
        const prompt = `You are a concise, encouraging nutrition coach. Write exactly ONE short paragraph (2-3 sentences max) reflecting on this person's past 7 days of tracking. Be specific about their numbers, honest about what's working or not, and end with one actionable tip for next week. Do NOT use bullet points or headers — just plain prose.

Stats:
- Days logged: ${loggedDays.length}/7
- Avg daily calories: ${avgCals} (target: ${target})
- Avg exercise burn: ${avgBurned}/day
- Total deficit: ~${Math.round(totalDeficit)} cal
- Weight change: ${weightChange !== null ? weightChange + ' lbs' : 'not enough data'}
- Streak: ${streak} days
- Plateau days: ${plateauDays}
- Top foods: ${topFoods.map(f => f.name).join(', ') || 'none'}`;
        reflection = await callClaude({ model: MODEL, max_tokens: 200, messages: [{ role: 'user', content: prompt }] });
      } catch (e) { /* non-fatal — reflection is optional */ }
    }

    state.weeklyReview = { avgCals, avgBurned, totalDeficit, weightChange, streak, plateauDays, topFoods, loggedDays: loggedDays.length, reflection };
  } catch (e) {
    toast('Could not load weekly data: ' + e.message, 'error');
    state.modal = null;
  }
  state.weeklyReviewLoading = false;
  render();
}

    const pool = [...state.recents, ...savedMealItems];

    food = unique[idx];

  });

// Module-level recognition instance so render() can't kill it
let _recognition = null;

function startVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    toast('Voice input not supported in this browser.', 'error');
    return;
  }
  if (_recognition) { _recognition.abort(); _recognition = null; state.micListening = false; render(); return; }

  _recognition = new SpeechRecognition();
  _recognition.lang = 'en-US';
  _recognition.interimResults = false;
  _recognition.maxAlternatives = 1;

  state.micListening = true;
  render();

  _recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    state.quickInput = transcript;
    state.micListening = false;
    _recognition = null;
    render();
  };

  _recognition.onerror = (e) => {
    state.micListening = false;
    _recognition = null;
    if (e.error !== 'aborted') toast('Voice input error: ' + e.error, 'error');
    render();
  };

  _recognition.onend = () => {
    if (state.micListening) { state.micListening = false; _recognition = null; render(); }
  };

  _recognition.start();
}

async function addFoodEntry(food) {
  const time = new Date().toISOString();
  const entry = {
    time,
    name: food.name,
    calories: Math.round(food.calories || 0),
    protein: Math.round(food.protein || 0),
    carbs: Math.round(food.carbs || 0),
    fat: Math.round(food.fat || 0),
    category: food.category || inferCategory(time),
    notes: food.notes || '',
  };
  const tempId = 'temp_' + Date.now() + '_' + Math.random();
  state.log = [...state.log, { ...entry, id: tempId }];
  closeModal();
  try {
    const id = await cloudAddFood(state.user.id, state.viewDate, entry);
    state.log = state.log.map(f => f.id === tempId ? { ...f, id } : f);
    haptic();
    // Extra buzz when calorie target is first crossed
    const netNow = state.log.reduce((a,f) => a+(f.calories||0), 0) - state.exercise.reduce((a,e) => a+(e.calories||0), 0);
    const netBefore = netNow - (entry.calories||0);
    if (netNow >= state.settings.calorieTarget && netBefore < state.settings.calorieTarget) haptic(30);
    const clean = { name: entry.name, calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat };
    const filtered = state.recents.filter(r => r.name.toLowerCase() !== clean.name.toLowerCase());
    state.recents = [clean, ...filtered].slice(0, 20);
    await cloudSaveData(state.user.id, 'recents', state.recents);
    refreshWeeklyCache();
    render();
  } catch (e) {
    state.log = state.log.filter(f => f.id !== tempId);
    toast('Could not save: ' + e.message, 'error');
    render();
  }
}

function switchAuthMode() {

  state.authError = '';
  render();

async function handleAuth() {
  const email = state.authEmail.trim();
  const pwd = state.authPassword;
  if (!email || pwd.length < 6) { state.authError = 'Need email + 6+ char password'; render(); return; }
  state.authBusy = true; state.authError = ''; render();
  try {
    if (state.authMode === 'signup') {
      const { data, error } = await sb.auth.signUp({ email, password: pwd });
      if (error) throw error;
      if (data.user) {
        state.authError = '';
        // Will be picked up by onAuthStateChange
      } else {
        state.authError = 'Check your email to confirm.';
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if (error) throw error;
    }
  } catch (e) {
    state.authError = e.message || 'Auth failed';
  } finally {
    state.authBusy = false;
    render();
  }
}

async function handleForgotPassword() {
  if (!state.authEmail.trim()) { state.authError = 'Enter your email first'; render(); return; }
  try {
    await sb.auth.resetPasswordForEmail(state.authEmail.trim());
    state.authError = 'Reset email sent — check inbox.';

  } catch (e) { state.authError = e.message; render(); }
}

function hasLegacyLocalData() {
  for (const k of ['settings', 'log', 'weights', 'water', 'recents', 'savedMeals']) {
    if (localStorage.getItem(k)) return true;
  }
  return false;
}

async function migrateLocalToCloud() {
  if (!state.user) return;
  try {
    const settings = load('settings', null);
    if (settings) await cloudSaveSettings(state.user.id, { ...DEFAULT_SETTINGS, ...settings });
    const weights = load('weights', []);
    for (const w of weights) await cloudSaveWeight(state.user.id, w.date, w.weight);
    const log = load('log', {});
    for (const date of Object.keys(log)) {
      for (const entry of log[date]) await cloudAddFood(state.user.id, date, entry);
    }
    const water = load('water', {});
    for (const date of Object.keys(water)) await cloudSaveWater(state.user.id, date, water[date]);
    for (const k of ['recents', 'exerciseRecents', 'plateauNotes', 'commitments', 'photos', 'savedMeals', 'customCondiments']) {
      const v = load(k, null);
      if (v) await cloudSaveData(state.user.id, k, v);
    }
    toast('Imported! Reloading…', 'success');
    location.reload();
  } catch (e) { toast('Import failed: ' + e.message, 'error'); }
}

// =====================
// URL PARAMS (Apple Shortcut)
// =====================
async function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  let acted = false;

  // Log a weight
  if (params.has('logWeight')) {
    const w = parseFloat(params.get('logWeight'));
    if (!isNaN(w) && w >= 50 && w <= 600) {
      const today = todayKey();
      state.weights = [...state.weights.filter(x => x.date !== today), { date: today, weight: w }].sort((a, b) => a.date.localeCompare(b.date));
      try { await cloudSaveWeight(state.user.id, today, w); } catch {}
      acted = true;
    }
  }

  // Add exercise (Apple Watch active calories)
  if (params.has('addExercise')) {
    const cal = parseInt(params.get('addExercise'), 10);
    const name = params.get('name') || 'Apple Watch';
    const duration = parseInt(params.get('duration'), 10) || 0;
    const replace = params.get('replace') === '1';
    if (!isNaN(cal) && cal > 0) {
      // If replace=1, remove any existing entry with same name first
      if (replace) {
        const existing = state.exercise.filter(e => e.name === name);
        for (const ex of existing) {
          state.exercise = state.exercise.filter(e => e.id !== ex.id);
          try { await cloudDeleteExercise(state.user.id, ex.id); } catch {}
        }
      }
      const entry = { time: new Date().toISOString(), name, calories: cal, duration };
      const tempId = 'temp_' + Date.now();
      state.exercise = [...state.exercise, { ...entry, id: tempId }];
      try {
        const id = await cloudAddExercise(state.user.id, todayKey(), entry);
        state.exercise = state.exercise.map(e => e.id === tempId ? { ...e, id } : e);
      } catch (e) { console.error(e); }
      acted = true;
    }
  }

  if (acted) {
    // Clear query string so refresh doesn't re-run
    window.history.replaceState({}, '', window.location.pathname);
    refreshWeeklyCache();
    render();
  }
}

// =====================
// WEEKLY CACHE (for streak)
// =====================
async function refreshWeeklyCache() {
  if (!state.user) return;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 365);
  const cutoffKey = cutoff.toISOString().slice(0, 10);
  try {
    const [foodRes, exRes] = await Promise.all([
      sb.from('food_log').select('date, entry').eq('user_id', state.user.id).gte('date', cutoffKey),
      sb.from('exercise_log').select('date, entry').eq('user_id', state.user.id).gte('date', cutoffKey),
    ]);
    const byDate = {};
    for (const r of (foodRes.data || [])) {
      byDate[r.date] = byDate[r.date] || { date: r.date, cals: 0, burned: 0, logCount: 0 };
      byDate[r.date].cals += r.entry?.calories || 0;
      byDate[r.date].logCount++;
    }
    for (const r of (exRes.data || [])) {
      byDate[r.date] = byDate[r.date] || { date: r.date, cals: 0, burned: 0, logCount: 0 };
      byDate[r.date].burned += r.entry?.calories || 0;
    }
    // Apply burned offset to net cals
    for (const d of Object.values(byDate)) d.cals = d.cals - d.burned;
    state.weeklyCache = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
  } catch (e) { console.error('weekly cache failed', e); }
}

    if (!all.settings && hasLegacyLocalData()) state.migrationPrompt = true;

    state.loadingCloud = false;

    await handleUrlParams();
  } catch (e) {

    toast('Failed to load data: ' + e.message, 'error');

}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  state.authReady = true;
  if (session) {
    state.user = session.user;
    await onSignedIn();
  } else {
    render();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      state.user = session.user;
      state.authError = '';
      state.authPassword = '';
      await onSignedIn();
    } else if (event === 'SIGNED_OUT') {
      state.user = null;
      state.log = []; state.water = 0; state.exercise = [];
      state.weights = []; state.recents = []; state.exerciseRecents = [];
      state.plateauNotes = []; state.commitments = {};
      state.photos = []; state.savedMeals = []; state.customCondiments = [];
      state.weeklyCache = [];
      state.activeTab = 'home';
      render();
    }
  });
}

function togglePlanLabMeal(id) {

    state.planLabSelection = state.planLabSelection.filter(x => x !== id);

  }
  render();
}

async function suggestMealSwap() {
  if (!state.apiKey) { toast('Add your Anthropic API key in Settings.', 'error'); return; }
  if (state.planLabSelection.length < 2) { toast('Select at least 2 meals to get a swap suggestion.', 'info'); return; }
  state.analyzing = true; state.error = ''; render();
  try {
    const s = state.settings;
    const meals = state.savedMeals;
    const selectedMeals = state.planLabSelection.map(id => {
      const m = meals.find(x => x.id === id);
      const cal = (m?.items || []).reduce((a, it) => a + (it.calories||0), 0);
      const p = (m?.items || []).reduce((a, it) => a + (it.protein||0), 0);
      return `${m?.name} (${cal} cal, P${p})`;
    });
    const totals = state.planLabSelection.reduce((acc, id) => {
      const m = meals.find(x => x.id === id);
      const mt = (m?.items || []).reduce((a, it) => ({ cal: a.cal+(it.calories||0), p: a.p+(it.protein||0) }), { cal:0, p:0 });
      return { cal: acc.cal+mt.cal, p: acc.p+mt.p };
    }, { cal:0, p:0 });
    const prompt = `I'm selecting these meals for my day: ${selectedMeals.join(', ')}. Total: ${totals.cal} cal, P${totals.p}. My daily target is ${s.calorieTarget} cal / P${s.proteinTarget}g. Which one meal should I swap out to get closer to my targets, and what should I replace it with (from my same general food preferences)? Reply in 2 sentences max.`;
    const result = await callClaude({ model: MODEL, max_tokens: 150, messages: [{ role: 'user', content: prompt }] });
    state.error = result; // reuse error field for inline display since it's non-fatal
  } catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function saveDayPlanFromSelection() {
  const name = state.planLabSaveName.trim();
  if (!name) { toast('Give your plan a name.', 'info'); return; }
  if (state.planLabSelection.length === 0) { toast('Select at least one meal.', 'info'); return; }
  const plan = { id: Date.now(), name, mealIds: [...state.planLabSelection], createdAt: new Date().toISOString(), usageCount: 0 };
  state.savedDayPlans = [...state.savedDayPlans, plan];
  state.planLabSaveName = '';

  try { await cloudSaveData(state.user.id, 'savedDayPlans', state.savedDayPlans); toast('Day plan saved!', 'success'); }
  catch (e) { toast('Save failed: ' + e.message, 'error'); }
}

async function executeDayPlanLog() {
  const pending = state.planLabPendingLog;
  if (!pending) return;
  closeModal();
  let logged = 0;
  if (pending.directItems) {
    // Builder/Discover plans log items directly
    for (const item of pending.directItems) {
      await addFoodEntry({ ...item, category: item.category || inferCategory(new Date().toISOString()) });
      logged++;
    }
  } else {
    for (const id of (pending.mealIds || [])) {
      const m = state.savedMeals.find(x => x.id === id);
      if (!m) continue;
      const cat = m.category || inferCategory(new Date().toISOString());
      for (const item of (m.items || [])) {
        await addFoodEntry({ ...item, category: cat });
        logged++;
      }
    }
    // Increment usage count if from a saved day plan
    if (pending.source === 'plan' && pending.planIdx != null) {
      state.savedDayPlans = state.savedDayPlans.map((dp, i) => i === pending.planIdx ? { ...dp, usageCount: (dp.usageCount||0) + 1 } : dp);
      cloudSaveData(state.user.id, 'savedDayPlans', state.savedDayPlans).catch(() => {});
    }
  }
  state.planLabPendingLog = null;
  toast(`Logged ${logged} items to today!`, 'success');
  goTab('log');
}

            </div>`).join('')}
          <div class="row" style="gap:6px;margin-top:12px">
            <button class="btn btn-secondary btn-sm" style="flex:1" onclick="saveBuilderPlanAsTemplate(${pi})">${icon('layers', 13)} Save meals</button>
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="logBuilderPlan(${pi})">${icon('plus', 13, '#000')} Log to today</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

async function handlePlanLabBuilder() {
  if (!state.apiKey) { toast('Add your Anthropic API key in Settings.', 'error'); return; }
  const s = state.settings;
  const con = state.planLabBuilderConstraints;
  state.analyzing = true; state.error = ''; state.planLabBuilderResults = []; render();
  try {
    const constraints = [
      con.cuisine && `cuisine: ${con.cuisine}`,
      con.dietary && `dietary: ${con.dietary}`,
      con.prepTime && `max prep time per meal: ${con.prepTime}`,
    ].filter(Boolean).join(', ');
    const prompt = `Create 3 distinct full-day meal plans that hit these targets: ${s.calorieTarget} cal, ${s.proteinTarget}g protein, ${s.carbTarget}g carbs, ${s.fatTarget}g fat. Each plan should have ${con.mealCount} meals (breakfast/lunch/dinner + snacks). ${state.planLabBuilderPrompt ? 'Extra requirements: ' + state.planLabBuilderPrompt + '.' : ''} ${constraints ? 'Constraints: ' + constraints + '.' : ''} Be conservative with calories. ONLY JSON, no preamble. Schema: [{"name": string (plan theme), "meals": [{"slot": string (Breakfast/Lunch/Dinner/Snack), "items": [{"name": string (food with portion), "calories": int, "protein": int, "carbs": int, "fat": int}]}]}]`;
    const t = await callClaude({ model: MODEL, max_tokens: 3000, messages: [{ role: 'user', content: prompt }] });
    const r = extractJSON(t);
    if (!r || !Array.isArray(r)) throw new Error('Could not parse response');
    state.planLabBuilderResults = r;
  } catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function handlePlanLabDiscover() {
  if (!state.apiKey) { toast('Add your Anthropic API key in Settings.', 'error'); return; }
  if (!state.planLabDiscoverQuery.trim()) return;
  const s = state.settings;
  state.analyzing = true; state.error = ''; state.planLabDiscoverResults = []; render();
  try {
    const prompt = `The user is searching for meal plan ideas matching: "${state.planLabDiscoverQuery}". Their daily targets are ${s.calorieTarget} cal / ${s.proteinTarget}g protein. Generate 2 full-day meal plans inspired by this style/theme. Use your knowledge of popular diets, fitness creators, and common meal prep approaches. ONLY JSON, no preamble. Schema: [{"name": string (plan name/inspiration), "meals": [{"slot": string (Breakfast/Lunch/Dinner/Snack), "items": [{"name": string (food with portion), "calories": int, "protein": int, "carbs": int, "fat": int}]}]}]`;
    const t = await callClaude({ model: MODEL, max_tokens: 2500, messages: [{ role: 'user', content: prompt }] });
    const r = extractJSON(t);
    if (!r || !Array.isArray(r)) throw new Error('Could not parse response');
    state.planLabDiscoverResults = r;
  } catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function saveBuilderPlanAsTemplate(planIdx) {
  const plan = state.planLabBuilderResults[planIdx];
  if (!plan) return;
  // Save each meal slot as a separate saved meal
  let saved = 0;
  for (const meal of (plan.meals || [])) {
    const name = `${plan.name} — ${meal.slot}`;
    const newMeal = { id: Date.now() + saved, name, category: inferCategory(new Date().toISOString()), items: meal.items || [] };
    state.savedMeals = [...state.savedMeals, newMeal];
    saved++;
  }
  try { await cloudSaveData(state.user.id, 'savedMeals', state.savedMeals); toast(`Saved ${saved} meals to your library!`, 'success'); }
  catch (e) { toast('Save failed: ' + e.message, 'error'); }
  render();
}

async function logBuilderPlan(planIdx) {
  const plan = state.planLabBuilderResults[planIdx];
  if (!plan) return;
  const allItems = (plan.meals || []).flatMap(m => (m.items || []).map(it => ({ ...it, category: inferCategory(new Date().toISOString()) })));
  state.planLabPendingLog = { source: 'builder', names: (plan.meals || []).map(m => m.slot || m.name), directItems: allItems };
  state.modal = 'confirmLogDayPlan';
  render();
}

// WAR ROOM AI
// =====================
async function generateMealsAPI(prompt, opts = {}) {
  const cw = state.weights.length ? state.weights[state.weights.length - 1].weight : state.settings.startWeight;
  const ctx = `User context: ${cw}lb, daily target ${state.settings.calorieTarget} cal, ${state.settings.proteinTarget}g protein. Goal: ${state.settings.goalWeight}lb.`;
  const constraints = opts.constraints || '';
  const t = await callClaude({
    model: MODEL, max_tokens: 2000,
    messages: [{ role: 'user', content: `${ctx}\n\nGenerate 3 distinct meal options for: "${prompt}". ${constraints}\n\nFor each meal: realistic ingredients with portions, accurate macros per ingredient. Be conservative on calories. ONLY JSON array, no preamble. Schema: [{"name": string (descriptive meal name), "notes": string (1-2 sentence prep summary), "items": [{"name": string (ingredient with portion), "calories": int, "protein": int, "carbs": int, "fat": int}]}]` }],
  });
  const r = extractJSON(t);
  if (!Array.isArray(r)) throw new Error('Expected array of meals');
  return r;
}

async function planDayAPI(remaining) {
  const t = await callClaude({
    model: MODEL, max_tokens: 2000,
    messages: [{ role: 'user', content: `User has ${remaining.cal} calories, ${remaining.p}g protein, ${remaining.cb}g carbs, ${remaining.f}g fat remaining for the day. Suggest 2-3 realistic meals/snacks that together hit those macros as closely as possible. Be conservative on calorie estimates. ONLY JSON, no preamble. Schema: {"strategy": string (1-sentence summary of the plan), "meals": [{"name": string, "notes": string (when to eat / why this works), "items": [{"name": string (ingredient with portion), "calories": int, "protein": int, "carbs": int, "fat": int}]}]}` }],
  });
  const r = extractJSON(t);
  if (!r || !Array.isArray(r.meals)) throw new Error('Bad response');
  return r;
}

async function importMealAPI(input) {
  const t = await callClaude({
    model: MODEL, max_tokens: 1500,
    messages: [{ role: 'user', content: `Extract a meal recipe from this user input: "${input}".\n\nIf it's a URL alone (no description), give a best-guess based on the URL/title and add a note saying it's an estimate. If it's recipe text, extract the actual ingredients and portions. Be conservative on calories. ONLY JSON, no preamble. Schema: {"name": string (meal name), "notes": string (prep notes or source attribution), "items": [{"name": string (ingredient with portion), "calories": int, "protein": int, "carbs": int, "fat": int}]}` }],
  });
  const r = extractJSON(t);
  if (!r || !Array.isArray(r.items)) throw new Error('Could not parse recipe');
  return r;
}

async function handleWarGenerate() {
  if (!state.warPrompt.trim()) return;
  state.analyzing = true; state.error = ''; state.warResults = []; render();
  try { state.warResults = await generateMealsAPI(state.warPrompt); }
  catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function handleWarPlan() {
  const cmp = computed();
  const remaining = {
    cal: Math.max(0, state.settings.calorieTarget - cmp.netCalories),
    p: Math.max(0, state.settings.proteinTarget - Math.round(cmp.totals.protein)),
    cb: Math.max(0, state.settings.carbTarget - Math.round(cmp.totals.carbs)),
    f: Math.max(0, state.settings.fatTarget - Math.round(cmp.totals.fat)),
  };
  if (remaining.cal < 50) {
    state.error = 'You\'re basically at your target — nothing meaningful left to plan.';
    render(); return;
  }
  state.analyzing = true; state.error = ''; state.warResults = []; state.warPlanResults = null; render();
  try {
    const r = await planDayAPI(remaining);
    state.warPlanResults = { strategy: r.strategy };
    state.warResults = r.meals;
  } catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function handleWarImport() {
  if (!state.warImportInput.trim()) return;
  state.analyzing = true; state.error = ''; state.warResults = []; render();
  try {
    const meal = await importMealAPI(state.warImportInput);
    state.warResults = [meal];
  } catch (e) { state.error = e.message; }
  finally { state.analyzing = false; render(); }
}

async function saveWarMealAsTemplate(i) {
  const meal = state.warResults[i];
  if (!meal) return;
  const newMeal = {
    id: Date.now(),
    name: meal.name,
    category: '',
    items: meal.items.map(it => ({
      name: it.name,
      calories: it.calories || 0,
      protein: it.protein || 0,
      carbs: it.carbs || 0,
      fat: it.fat || 0,
    })),
    created: new Date().toISOString(),
  };
  state.savedMeals = [...state.savedMeals, newMeal];
  try {
    await cloudSaveData(state.user.id, 'savedMeals', state.savedMeals);
    // Brief feedback
    state.error = '';
    const btn = event?.target?.closest('button');
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = `${icon('check', 13)} Saved`;
      btn.style.color = 'var(--lime)';
      setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 1500);
    }
  } catch (e) { toast('Save failed: ' + e.message, 'error'); }
}

async function logWarMeal(i) {
  const meal = state.warResults[i];
  if (!meal) return;
  const cat = inferCategory(new Date().toISOString());
  for (const item of meal.items) {
    await addFoodEntry({ ...item, category: cat });
  }
  // Switch to home so they can see it
  state.activeTab = 'home';
  save('activeTab', 'home');
  state.warResults = [];
  state.warPrompt = '';
  state.warImportInput = '';
  state.warPlanResults = null;
  render();
}
