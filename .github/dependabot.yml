version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - security

  # npm (covers supabase-js SRI pin — bump via PR so hash can be updated)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - security
    ignore:
      # Only flag security-relevant bumps for major versions
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
