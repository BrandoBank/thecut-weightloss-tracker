name: Security & Quality Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  headers-lint:
    name: Validate security headers config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required headers present in netlify.toml
        run: |
          required=(
            "Content-Security-Policy"
            "Strict-Transport-Security"
            "X-Frame-Options"
            "X-Content-Type-Options"
            "Referrer-Policy"
            "Permissions-Policy"
            "Cross-Origin-Opener-Policy"
            "Cross-Origin-Embedder-Policy"
            "Cross-Origin-Resource-Policy"
          )
          missing=()
          for header in "${required[@]}"; do
            if ! grep -q "$header" netlify.toml; then
              missing+=("$header")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required security headers: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required security headers present"

      - name: Check no hardcoded API keys in source
        run: |
          if grep -rE 'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{10,}' --include="*.html" --include="*.js" --include="*.ts" .; then
            echo "❌ Hardcoded Anthropic API key detected in source"
            exit 1
          fi
          if grep -rE 'eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}' --include="*.html" --include="*.js" .; then
            echo "❌ Possible JWT/Supabase service key detected in source"
            exit 1
          fi
          echo "✅ No hardcoded credentials detected"

      - name: Check SRI present on external scripts
        run: |
          if grep -E '<script src="https://' index.html | grep -qv 'integrity='; then
            echo "❌ External script tag missing SRI integrity attribute"
            exit 1
          fi
          echo "✅ All external scripts have SRI"
